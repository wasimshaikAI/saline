<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalineGuard Pro | Enterprise</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .saline-loader { position: relative; width: 60px; height: 100px; margin: 0 auto; }
        .bottle {
            width: 40px; height: 60px; border: 3px solid #3b82f6; border-radius: 0 0 20px 20px;
            margin: 0 auto; position: relative; overflow: hidden; background: rgba(255,255,255,0.8);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .bottle::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #60a5fa; animation: drain 2s infinite linear;
        }
        .drip {
            width: 8px; height: 12px; background: #3b82f6; border-radius: 50%; margin: 5px auto 0;
            animation: drop 1s infinite cubic-bezier(0.5, 0, 1, 0.5);
        }
        @keyframes drain { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes drop { 0% { transform: translateY(0) scaleY(1); opacity: 1; } 100% { transform: translateY(40px) scaleY(0); opacity: 0; } }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .critical-alert { animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); border-color: #ef4444; }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); border-color: #ef4444; }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); border-color: #ef4444; }
        }
        .glow-card { transition: all 0.3s ease; }
        .glow-card:hover { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15), 0 8px 10px -6px rgba(59, 130, 246, 0.1); transform: translateY(-2px); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    // --- Config ---
    const MAINTENANCE_FEE_PER_DEVICE = 200; 
    
    // REPLACE WITH YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCYkB2xXeZDT7OA8UyCwDt0ipc3oLXDzkw",
        authDomain: "salinemonitor-7534e.firebaseapp.com",
        databaseURL: "https://salinemonitor-7534e-default-rtdb.firebaseio.com/",
        projectId: "salinemonitor-7534e",
        storageBucket: "salinemonitor-7534e.firebasestorage.app",
        messagingSenderId: "973031594138",
        appId: "1:973031594138:web:b8b98226c33ef744bfa723"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const { useState, useEffect, useMemo } = React;

    // --- Helpers ---
    const formatMoney = (amt) => "₹" + (amt || 0).toLocaleString('en-IN');
    
    const getHospitalInfo = (email) => {
        if(!email) return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };
        if(email === 'admin@gmail.com') return { id: 'super_admin', name: 'Super Admin', loc: 'Global', domain: '' };

        const parts = email.split('@');
        if(parts.length < 2) return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };

        const domainFull = parts[1];
        const domainParts = domainFull.split('.');
        if(domainParts.length >= 2) { 
            const hName = domainParts[0];
            const hLoc = domainParts[1];
            return {
                id: `${hName}_${hLoc}`.toLowerCase(),
                name: hName.charAt(0).toUpperCase() + hName.slice(1) + " Hospital",
                loc: hLoc.charAt(0).toUpperCase() + hLoc.slice(1),
                domain: `${hName}.${hLoc}`
            };
        }
        return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };
    };

    const filterHistoryByTime = (histList, period) => {
        if (period === 'max') return histList;
        const now = Date.now();
        const periods = { day: 86400000, week: 7 * 86400000, month: 30 * 86400000 };
        return histList.filter(h => (now - (h.completedAt || h.startTime)) <= periods[period]);
    };

    // --- Components ---
    const LoadingScreen = () => (
        <div className="fixed inset-0 bg-slate-50 z-[9999] flex flex-col items-center justify-center">
            <div className="saline-loader">
                <div className="bottle"></div>
                <div className="drip"></div>
            </div>
            <h2 className="text-xl font-extrabold text-slate-800 tracking-widest mt-6">SALINE GUARD</h2>
            <p className="text-xs text-blue-500 mt-2 font-mono font-medium">Initializing System...</p>
        </div>
    );

    const Toast = ({ msg, type, onClose }) => (
        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 fade-in ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white border border-slate-700'}`}>
            <i className={`fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'} text-emerald-400`}></i>
            <span className="font-bold text-sm whitespace-nowrap">{msg}</span>
        </div>
    );

    const Clock = () => {
        const [t, setT] = useState(new Date());
        useEffect(() => { setInterval(() => setT(new Date()), 1000); }, []);
        return (
            <div className="text-right">
                <div className="font-mono font-bold text-lg leading-none text-white">
                    {t.toLocaleTimeString('en-IN', { hour12: true, hour:'2-digit', minute:'2-digit', second:'2-digit' }).toUpperCase()}
                </div>
                <div className="text-[10px] uppercase font-bold text-slate-400 mt-1 tracking-wider">
                    {t.toLocaleDateString('en-IN', { weekday: 'long', day:'numeric', month:'short' }).toUpperCase()}
                </div>
            </div>
        );
    };

    const AppHeader = ({ title, subtitle, onLogout }) => (
        <header className="bg-slate-900 px-4 py-3 md:px-6 md:py-4 flex justify-between items-center shadow-lg sticky top-0 z-40 border-b border-slate-800 backdrop-blur-md bg-slate-900/90">
            <div className="flex items-center gap-4">
                <div className="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <i className="fas fa-heartbeat text-xl"></i>
                </div>
                <div>
                    <h2 className="font-extrabold text-white text-sm md:text-lg leading-tight">{title}</h2>
                    <p className="text-[10px] md:text-xs text-blue-400 font-bold uppercase tracking-widest mt-0.5">{subtitle}</p>
                </div>
            </div>
            <div className="flex items-center gap-4 md:gap-6">
                <Clock />
                <div className="hidden md:block w-px h-8 bg-slate-700/50"></div>
                <button onClick={onLogout} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 hover:bg-red-500 hover:text-white hover:shadow-lg hover:shadow-red-500/30 transition-all flex items-center justify-center">
                    <i className="fas fa-power-off"></i>
                </button>
            </div>
        </header>
    );

    const FilterTabs = ({ current, onChange, resultCount }) => (
        <div className="flex flex-col md:flex-row md:items-center gap-4 mb-5">
            <div className="flex gap-2">
                {['day', 'week', 'month', 'max'].map(p => (
                    <button key={p} onClick={() => onChange(p)} className={`px-4 py-1.5 text-xs font-bold rounded-lg uppercase tracking-wider transition-colors border ${current === p ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-500/20' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                        {p}
                    </button>
                ))}
            </div>
            {resultCount !== undefined && (
                <div className="text-xs font-bold text-slate-400">
                    <i className="fas fa-poll-h mr-1"></i> Showing {resultCount} records
                </div>
            )}
        </div>
    );

    const StatusCard = ({ data, onComplete, isHistory = false }) => {
        const perc = data.perc || 0;
        const isCrit = perc <= 10 && !isHistory;
        const displayName = data.patientName || `Room ${data.room} - Bed ${data.bed}`;

        return (
            <div className={`relative bg-white rounded-2xl p-5 border transition-all duration-300 shadow-sm flex flex-col justify-between ${isCrit ? 'border-red-400 critical-alert' : 'border-slate-200 hover:shadow-md'}`}>
                <div>
                    <div className="flex justify-between items-start mb-4">
                        <div className="pr-2">
                            <h3 className="font-bold text-slate-800 text-lg truncate w-32 md:w-40" title={displayName}>{displayName}</h3>
                            <div className="flex items-center gap-2 mt-2 text-xs font-bold text-slate-600">
                                <span className="bg-blue-50/50 px-2.5 py-1 rounded-lg border border-blue-100"><i className="fas fa-door-open mr-1 text-blue-500"></i> R: {data.room}</span>
                                <span className="bg-indigo-50/50 px-2.5 py-1 rounded-lg border border-indigo-100"><i className="fas fa-bed mr-1 text-indigo-500"></i> B: {data.bed}</span>
                            </div>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-3 py-2 text-center shadow-sm">
                            <div className="text-[9px] uppercase font-bold text-slate-400 mb-0.5 tracking-wider">Device ID</div>
                            <div className="font-mono font-bold text-sm leading-none text-slate-700">{data.deviceId}</div>
                        </div>
                    </div>
                    <div className="mb-4">
                        <div className="flex justify-between text-xs font-bold mb-2">
                            <span className={perc <= 10 && !isHistory ? 'text-red-600 animate-pulse' : 'text-blue-600'}>{perc}% Infused</span>
                            <span className="text-slate-400 font-mono">{isHistory ? 'Done' : `${data.minsLeft || 0}m left`}</span>
                        </div>
                        <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                            <div className={`h-full rounded-full transition-all duration-1000 ${isHistory ? 'bg-emerald-500' : (perc<=10 ? 'bg-red-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500')}`} style={{width: `${perc}%`}}></div>
                        </div>
                    </div>
                </div>
                <div className="flex justify-between items-center pt-4 border-t border-slate-100 mt-auto">
                    <div className="text-[10px] text-slate-500 font-medium">
                        <div className="mb-1 text-slate-700 font-bold flex items-center">
                            <i className="fas fa-user-nurse mr-1.5 text-slate-400"></i>
                            <span>{data.nurseName || 'Unknown Staff'}</span>
                        </div>
                        {isHistory ?
                            <span className={`px-2 py-0.5 rounded-md ${data.autoDischarged ? 'text-amber-600 bg-amber-50' : 'text-emerald-600 bg-emerald-50'}`}>
                                <i className={`fas ${data.autoDischarged ? 'fa-clock' : 'fa-check-circle'} mr-1`}></i> 
                                {data.autoDischarged ? 'Auto Discharged' : new Date(data.completedAt).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' })}
                            </span> :
                            <span className="text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md">Started: {new Date(data.startTime).toLocaleString('en-IN', { timeStyle: 'short' })}</span>
                        }
                    </div>
                    {!isHistory && (
                        <button
                            onClick={() => onComplete?.(data.deviceId)}
                            className="bg-slate-900 hover:bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-md active:scale-95 transition-all flex items-center gap-2 group"
                        >
                            <span>Discharge</span> <i className="fas fa-check text-slate-400 group-hover:text-white transition-colors"></i>
                        </button>
                    )}
                </div>
            </div>
        );
    };

    const PatientFormModal = ({ isOpen, onClose, hospitalId, user, onSuccess }) => {
        const [form, setForm] = useState({ id: '', name: '', room: '', bed: '' });
        const [loading, setLoading] = useState(false);

        const handleSubmit = async () => {
            if(!form.id || !form.room || !form.bed) {
                alert("Device ID, Room Number, and Bed Number are mandatory."); return;
            }
            
            setLoading(true);
            const did = form.id.toUpperCase();

            try {
                const hRef = db.ref(`hospitals/${hospitalId}`);
                const devSnap = await hRef.child(`active_devices/${did}`).once('value');
                
                if (devSnap.exists()) {
                    alert(`Device ${did} is currently active! Ensure it is discharged first.`);
                    setLoading(false); return;
                }

                await hRef.child(`active_devices/${did}`).set({
                    deviceId: did, patientName: form.name.trim() || '', room: form.room, bed: form.bed,
                    nurseId: user.uid, nurseName: user.name || 'Staff', startTime: Date.now(), perc: 100, minsLeft: 60
                });

                setForm({ id: '', name: '', room: '', bed: '' });
                onSuccess(); onClose();
            } catch (e) { alert(e.message); }
            setLoading(false);
        };

        if(!isOpen) return null;
        return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl p-7 shadow-2xl relative overflow-hidden border border-slate-100">
                    <div className="flex justify-between items-center mb-6">
                        <div><h3 className="font-extrabold text-slate-800 text-xl">New Infusion</h3><p className="text-xs font-medium text-slate-400 mt-1">Connect device to patient bed</p></div>
                        <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors flex items-center justify-center"><i className="fas fa-times"></i></button>
                    </div>
                    <div className="space-y-4">
                        <div className="relative">
                            <input value={form.id} onChange={e=>setForm({...form, id:e.target.value})} placeholder="e.g. SC2601" className="w-full p-4 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 rounded-xl outline-none font-mono text-center text-xl font-bold tracking-widest uppercase transition-all" autoFocus />
                            <div className="text-[10px] uppercase tracking-wider font-bold text-center text-slate-400 mt-2">Device ID <span className="text-red-500">*</span></div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <input value={form.room} onChange={e=>setForm({...form, room:e.target.value})} placeholder="Room 101" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-bold text-slate-700" />
                                <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 ml-1">Room No <span className="text-red-500">*</span></div>
                            </div>
                            <div>
                                <input value={form.bed} onChange={e=>setForm({...form, bed:e.target.value})} placeholder="Bed A" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-bold text-slate-700" />
                                <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 ml-1">Bed No <span className="text-red-500">*</span></div>
                            </div>
                        </div>
                        <div className="pt-2">
                            <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Patient Name (Optional)" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium text-slate-700 placeholder-slate-400" />
                        </div>
                        <button onClick={handleSubmit} disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white mt-2 py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : <span>Start Monitoring</span>}
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const EditNurseModal = ({ isOpen, onClose, hospitalId, currentNurse, onSuccess }) => {
        const [form, setForm] = useState({ name: '', phone: '' });
        const [loading, setLoading] = useState(false);

        useEffect(() => {
            if (currentNurse) setForm({ name: currentNurse.name, phone: currentNurse.phone });
        }, [currentNurse]);

        const handleSubmit = async () => {
            if(!form.name || !form.phone) return alert("Fields cannot be empty.");
            setLoading(true);
            try {
                await db.ref(`hospitals/${hospitalId}/nurses/${currentNurse.uid}`).update({
                    name: form.name,
                    phone: form.phone
                });
                onSuccess();
                onClose();
            } catch (e) { alert(e.message); }
            setLoading(false);
        };

        if(!isOpen || !currentNurse) return null;
        return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl p-7 shadow-2xl relative overflow-hidden border border-slate-100">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-extrabold text-slate-800 text-lg">Edit Staff Details</h3>
                        <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-200 flex items-center justify-center"><i className="fas fa-times"></i></button>
                    </div>
                    <div className="space-y-4">
                        <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Full Name" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" />
                        <input value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} placeholder="Contact Number" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" />
                        <div className="text-[11px] font-mono text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100">ID: {currentNurse.email}</div>
                        <button onClick={handleSubmit} disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 active:scale-95 transition-all">
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : <span>Save Changes</span>}
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const AddNurseModal = ({ isOpen, onClose, hospitalId, hospitalDomain, onSuccess }) => {
        const [form, setForm] = useState({ name: '', phone: '', password: '' });
        const [loading, setLoading] = useState(false);
        const [generatedEmail, setGeneratedEmail] = useState('');
        const [showSuccess, setShowSuccess] = useState(false);
        const [creds, setCreds] = useState(null);

        useEffect(() => {
            if (form.name) {
                const nurseUsername = form.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                setGeneratedEmail(`${nurseUsername}@${hospitalDomain}`);
            } else setGeneratedEmail('');
        }, [form.name, hospitalDomain]);

        const handleSubmit = async () => {
            if (!form.name || !form.phone || !form.password || form.password.length < 6) {
                alert('Please fill all fields. Password must be at least 6 characters.'); return;
            }
            setLoading(true);
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(generatedEmail, form.password);
                const uid = userCredential.user.uid;
                await db.ref(`hospitals/${hospitalId}/nurses/${uid}`).set({
                    name: form.name, email: generatedEmail, phone: form.phone, uid: uid, joined: Date.now()
                });
                setCreds({ email: generatedEmail, password: form.password });
                setShowSuccess(true);
                setForm({ name: '', phone: '', password: '' });
                onSuccess();
            } catch (e) { alert(e.message); }
            setLoading(false);
        };

        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl p-7 shadow-2xl relative overflow-hidden border border-slate-100">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-extrabold text-slate-800 text-lg">Register Staff</h3>
                        <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-200 flex items-center justify-center"><i className="fas fa-times"></i></button>
                    </div>
                    <div className="space-y-4">
                        <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Full Name" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" />
                        <input value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} placeholder="Contact Number" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" />
                        <input type="password" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} placeholder="Assign Password (Min 6)" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" />
                        <div className="text-[11px] font-mono text-blue-600 bg-blue-50 p-3 rounded-lg break-all border border-blue-100">ID: {generatedEmail || 'Enter name to generate'}</div>
                        <button onClick={handleSubmit} disabled={loading} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg shadow-slate-300 active:scale-95 transition-all">
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : <span>Create Account</span>}
                        </button>
                    </div>
                </div>
                <SuccessCredentialsModal isOpen={showSuccess} creds={creds} onClose={() => setShowSuccess(false)} />
            </div>
        );
    };

    const SuccessCredentialsModal = ({ isOpen, creds, onClose }) => {
        if (!isOpen || !creds) return null;
        return (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4 fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl relative overflow-hidden border border-slate-100">
                    <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-8 text-center">
                        <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-check text-3xl"></i></div>
                        <h3 className="text-2xl font-extrabold tracking-tight">Account Created!</h3>
                    </div>
                    <div className="p-7 space-y-4">
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <p className="text-[10px] font-bold tracking-widest text-slate-400 mb-1 uppercase">Email Address</p>
                            <p className="font-mono font-bold text-slate-800">{creds.email}</p>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <p className="text-[10px] font-bold tracking-widest text-slate-400 mb-1 uppercase">Initial Password</p>
                            <p className="font-mono font-bold text-slate-800 tracking-wider">{creds.password}</p>
                        </div>
                        <button onClick={() => { navigator.clipboard.writeText(`Email: ${creds.email}\nPassword: ${creds.password}`); alert("Copied!"); }} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl font-bold transition-colors">Copy Credentials</button>
                        <button onClick={onClose} className="w-full text-slate-500 hover:text-slate-800 py-2 font-bold transition-colors">Done</button>
                    </div>
                </div>
            </div>
        );
    };

    // --- Analytics Chart Component (Super Admin) ---
    const UsageChart = ({ historyData }) => {
        const [range, setRange] = useState('monthly'); // weekly, monthly, yearly, max

        const chartData = useMemo(() => {
            const dataMap = {};
            const labels = [];
            const now = new Date();

            if (range === 'weekly') {
                for(let i=6; i>=0; i--) {
                    const d = new Date(now); d.setDate(d.getDate() - i);
                    const label = d.toLocaleDateString('en-US', {weekday: 'short'});
                    const key = d.toDateString();
                    dataMap[key] = { label, count: 0 };
                    labels.push(key);
                }
                historyData.forEach(h => {
                    const d = new Date(h.completedAt || h.startTime).toDateString();
                    if(dataMap[d]) dataMap[d].count++;
                });
            } else if (range === 'monthly') {
                for(let i=5; i>=0; i--) {
                    const d = new Date(now); d.setMonth(d.getMonth() - i);
                    const label = d.toLocaleString('default', { month: 'short' });
                    const key = `${d.getFullYear()}-${d.getMonth()}`;
                    dataMap[key] = { label, count: 0 };
                    labels.push(key);
                }
                historyData.forEach(h => {
                    const d = new Date(h.completedAt || h.startTime);
                    const key = `${d.getFullYear()}-${d.getMonth()}`;
                    if(dataMap[key]) dataMap[key].count++;
                });
            } else if (range === 'yearly') {
                for(let i=4; i>=0; i--) {
                    const y = now.getFullYear() - i;
                    dataMap[y] = { label: y.toString(), count: 0 };
                    labels.push(y);
                }
                historyData.forEach(h => {
                    const y = new Date(h.completedAt || h.startTime).getFullYear();
                    if(dataMap[y]) dataMap[y].count++;
                });
            } else {
                const years = new Set(historyData.map(h => new Date(h.completedAt || h.startTime).getFullYear()));
                const minYear = years.size ? Math.min(...years) : now.getFullYear();
                for(let y = minYear; y <= now.getFullYear(); y++) {
                    dataMap[y] = { label: y.toString(), count: 0 };
                    labels.push(y);
                }
                historyData.forEach(h => {
                    const y = new Date(h.completedAt || h.startTime).getFullYear();
                    if(dataMap[y]) dataMap[y].count++;
                });
            }

            return labels.map(k => dataMap[k]);
        }, [historyData, range]);

        const maxCount = Math.max(...chartData.map(d => d.count), 5); 

        return (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 fade-in">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-sm font-extrabold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                        <i className="fas fa-chart-line text-blue-500"></i> Infusion Volume
                    </h3>
                    <div className="flex bg-slate-100 rounded-lg p-1">
                        {['weekly', 'monthly', 'yearly', 'max'].map(r => (
                            <button key={r} onClick={()=>setRange(r)} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md transition-colors ${range === r ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{r}</button>
                        ))}
                    </div>
                </div>
                
                <div className="flex items-end justify-between h-40 gap-2 md:gap-4 mt-4">
                    {chartData.map((d, i) => {
                        const heightPerc = Math.max((d.count / maxCount) * 100, 2); 
                        return (
                            <div key={i} className="flex-1 flex flex-col items-center group relative">
                                <div className="absolute -top-10 bg-slate-800 text-white text-[10px] font-bold px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                                    {d.count} Patients
                                </div>
                                <div className="w-full bg-blue-100 rounded-t-md flex items-end justify-center relative overflow-hidden transition-all duration-500 ease-out" style={{height: '100%'}}>
                                    <div className="w-full bg-gradient-to-t from-blue-600 to-blue-400 rounded-t-md transition-all duration-1000" style={{height: `${heightPerc}%`}}></div>
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">{d.label}</span>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    };

    // ────────────────────────────────────────────────
    // HOSPITAL ADMIN DASHBOARD
    // ────────────────────────────────────────────────
    const HospitalDashboard = ({ hospitalId, userRole, isSuperView = false }) => {
        const [data, setData] = useState(null);
        const [tab, setTab] = useState('active');
        const [showAddNurse, setShowAddNurse] = useState(false);
        const [showEditNurse, setShowEditNurse] = useState(false);
        const [selectedNurse, setSelectedNurse] = useState(null);
        const [toast, setToast] = useState(null);
        const [searchTerm, setSearchTerm] = useState('');
        const [filterPeriod, setFilterPeriod] = useState('max');
        const hospitalInfo = getHospitalInfo(auth.currentUser.email);
        
        useEffect(() => {
            const ref = db.ref(`hospitals/${hospitalId}`);
            ref.on('value', snap => {
                const val = snap.val() || {};
                
                // --- 24-HOUR AUTO DISCHARGE LOGIC ---
                if (val && val.active_devices) {
                    const now = Date.now();
                    const oneDay = 24 * 60 * 60 * 1000;
                    Object.values(val.active_devices).forEach(dev => {
                        if (now - dev.startTime >= oneDay) {
                            db.ref(`hospitals/${hospitalId}/history`).push({
                                ...dev,
                                completedAt: now,
                                autoDischarged: true
                            });
                            db.ref(`hospitals/${hospitalId}/active_devices/${dev.deviceId}`).remove();
                        }
                    });
                }
                
                if (!snap.exists() && userRole === 'admin') {
                     ref.set({ name: hospitalInfo.name, location: hospitalInfo.loc });
                }
                setData(val);
            });
            return () => ref.off();
        }, [hospitalId, hospitalInfo.name, hospitalInfo.loc, userRole]);

        const handleDischarge = (did) => {
            if(!confirm("Discharge patient and end monitoring?")) return;
            const dev = data.active_devices[did];
            db.ref(`hospitals/${hospitalId}/history`).push({ ...dev, completedAt: Date.now() }, (error) => {
                if(!error) db.ref(`hospitals/${hospitalId}/active_devices/${did}`).remove();
            });
        };

        const handleDeleteNurse = async (uid) => {
            if(!confirm("Delete this staff member completely? This action cannot be undone.")) return;
            try {
                await db.ref(`hospitals/${hospitalId}/nurses/${uid}`).remove();
                setToast({type: 'success', msg: 'Staff removed'});
                setTimeout(()=>setToast(null), 2000);
            } catch(e) { alert(e.message); }
        };

        if (!data) return <div className="p-12 text-center text-slate-400 font-medium animate-pulse">Syncing Hospital Data...</div>;

        const activeDevs = data.active_devices ? Object.values(data.active_devices) : [];
        const historyDevs = data.history ? Object.values(data.history).sort((a,b)=>b.completedAt - a.completedAt) : [];
        const nurses = data.nurses ? Object.values(data.nurses) : [];
        
        const allDeviceIds = new Set([...activeDevs.map(d => d.deviceId), ...historyDevs.map(d => d.deviceId)]);
        const totalUniqueDevices = allDeviceIds.size;

        const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
        const todayDischarges = historyDevs.filter(h => h.completedAt >= startOfDay.getTime());

        const filterData = (list) => {
            if (!searchTerm) return list;
            const lower = searchTerm.toLowerCase();
            return list.filter(item =>
                (item.patientName?.toLowerCase().includes(lower)) ||
                (item.deviceId?.toLowerCase().includes(lower)) ||
                (item.nurseName?.toLowerCase().includes(lower)) ||
                (item.room?.toLowerCase().includes(lower)) ||
                (item.bed?.toLowerCase().includes(lower)) ||
                (item.name?.toLowerCase().includes(lower)) ||
                (item.email?.toLowerCase().includes(lower))
            );
        };

        const filteredActive = filterData(activeDevs);
        const filteredHistory = filterHistoryByTime(filterData(historyDevs), filterPeriod);
        const filteredNurses = filterData(nurses);

        return (
            <div className="space-y-6 fade-in">
                {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
                
                {isSuperView && <UsageChart historyData={historyDevs} />}

                <div className="bg-white p-2.5 rounded-2xl shadow-sm border border-slate-200 flex items-center mb-6">
                    <i className="fas fa-search text-slate-400 ml-3"></i>
                    <input type="text" placeholder="Search Patients, Devices, Staff, Rooms..." className="w-full p-2 outline-none text-sm text-slate-700 ml-2 font-medium" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all group glow-card">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i className="fas fa-procedures"></i></div>
                            <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest group-hover:text-blue-500 transition-colors">Active Patients</div>
                        </div>
                        <div className="text-4xl font-black text-slate-800 tracking-tight">{activeDevs.length}</div>
                    </div>
                    
                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all group glow-card">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-8 h-8 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center"><i className="fas fa-clipboard-check"></i></div>
                            <div className="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest group-hover:text-emerald-500 transition-colors">Today's Discharges</div>
                        </div>
                        <div className="text-4xl font-black text-slate-800 tracking-tight">{todayDischarges.length}</div>
                    </div>

                    <div className="bg-gradient-to-br from-slate-900 to-slate-800 p-6 rounded-2xl shadow-xl text-white relative overflow-hidden glow-card">
                        <div className="absolute -right-4 -top-4 opacity-10"><i className="fas fa-satellite-dish text-9xl"></i></div>
                        <div className="relative z-10">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-8 h-8 rounded-full bg-white/10 text-blue-300 flex items-center justify-center backdrop-blur-sm"><i className="fas fa-microchip"></i></div>
                                <div className="text-[11px] font-extrabold text-blue-200 uppercase tracking-widest">Registered Devices</div>
                            </div>
                            <div className="text-4xl font-black text-white tracking-tight">{totalUniqueDevices}</div>
                            {isSuperView && (
                                <div className="mt-3 inline-block bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold tracking-wider text-blue-200 backdrop-blur-sm border border-white/10">
                                    Est. Monthly: {formatMoney(totalUniqueDevices * MAINTENANCE_FEE_PER_DEVICE)}
                                </div>
                            )}
                        </div>
                    </div>
                </div>

                <div className="flex gap-8 border-b border-slate-200 mt-8 px-2 overflow-x-auto">
                    {['active', 'history', 'nurses'].map(t => (
                        <button key={t} onClick={()=>setTab(t)} className={`pb-3 text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 whitespace-nowrap ${tab===t ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>
                            {t}
                        </button>
                    ))}
                </div>

                <div className="min-h-[300px] pt-4">
                    {tab === 'active' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                            {filteredActive.map(d => <StatusCard key={d.deviceId} data={d} onComplete={handleDischarge} />)}
                            {filteredActive.length === 0 && <div className="col-span-full py-16 text-center text-slate-400 font-medium bg-white rounded-2xl border border-dashed border-slate-200">No active infusions right now.</div>}
                        </div>
                    )}
                    
                    {tab === 'history' && (
                        <div>
                            <FilterTabs current={filterPeriod} onChange={setFilterPeriod} resultCount={filteredHistory.length} />
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 opacity-90">
                                {filteredHistory.slice(0, 50).map((d, i) => <StatusCard key={i} data={d} isHistory={true} />)}
                                {filteredHistory.length === 0 && <div className="col-span-full py-16 text-center text-slate-400 font-medium bg-white rounded-2xl border border-dashed border-slate-200">No history records found for this period.</div>}
                            </div>
                        </div>
                    )}

                    {tab === 'nurses' && (
                        <div>
                            {!isSuperView && (
                                <button onClick={() => setShowAddNurse(true)} className="mb-6 bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all flex items-center gap-2">
                                    <i className="fas fa-plus"></i> Add Staff Member
                                </button>
                            )}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                {filteredNurses.map((n, i) => (
                                    <div key={i} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 text-blue-700 flex items-center justify-center font-extrabold text-lg shadow-inner">
                                                {n.name.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <div className="font-extrabold text-slate-800">{n.name}</div>
                                                <div className="text-xs font-medium text-slate-500 mt-0.5">{n.email}</div>
                                                <div className="text-xs font-medium text-slate-400 mt-0.5">{n.phone}</div>
                                            </div>
                                        </div>
                                        {!isSuperView && (
                                            <div className="flex gap-2 mt-4 pt-4 border-t border-slate-100">
                                                <button onClick={() => { setSelectedNurse(n); setShowEditNurse(true); }} className="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-600 text-xs font-bold py-2 rounded-lg transition-colors">Edit</button>
                                                <button onClick={() => handleDeleteNurse(n.uid)} className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold py-2 rounded-lg transition-colors">Delete</button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {filteredNurses.length === 0 && <div className="text-slate-400 col-span-full py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl">No staff registered.</div>}
                            </div>
                        </div>
                    )}
                </div>

                <AddNurseModal isOpen={showAddNurse} onClose={()=>setShowAddNurse(false)} hospitalId={hospitalId} hospitalDomain={hospitalInfo.domain} onSuccess={() => { setToast({type: 'success', msg: 'Staff Added'}); setTimeout(()=>setToast(null), 2000); }} />
                <EditNurseModal isOpen={showEditNurse} onClose={()=>setShowEditNurse(false)} hospitalId={hospitalId} currentNurse={selectedNurse} onSuccess={() => { setToast({type: 'success', msg: 'Staff Updated'}); setTimeout(()=>setToast(null), 2000); }} />
            </div>
        );
    };

    // ────────────────────────────────────────────────
    // NURSE VIEW
    // ────────────────────────────────────────────────
    const NurseApp = ({ user, onLogout }) => {
        const { id: hid, name: hName } = getHospitalInfo(user.email);
        const [devices, setDevices] = useState([]);
        const [history, setHistory] = useState([]);
        const [showAdd, setShowAdd] = useState(false);
        const [toast, setToast] = useState(null);
        const [tab, setTab] = useState('active');
        const [filterPeriod, setFilterPeriod] = useState('max');
        const [nurseName, setNurseName] = useState('');

        useEffect(() => {
            const hRef = db.ref(`hospitals/${hid}`);
            hRef.child(`nurses/${user.uid}`).once('value').then(snap => { if (snap.exists()) setNurseName(snap.val().name); });
            
            hRef.child('active_devices').on('value', snap => {
                const d = []; 
                const now = Date.now();
                const oneDay = 24 * 60 * 60 * 1000;
                
                snap.forEach(c => { 
                    const val = c.val();
                    // Check Auto-Discharge locally as a safety net
                    if (now - val.startTime >= oneDay) {
                        hRef.child('history').push({...val, completedAt: now, autoDischarged: true});
                        c.ref.remove();
                    } else if (val.nurseId === user.uid) {
                        d.push(val); 
                    }
                });
                setDevices(d);
            });
            hRef.child('history').on('value', snap => {
                const h = []; snap.forEach(c => { if (c.val().nurseId === user.uid) h.push(c.val()); });
                setHistory(h.sort((a,b) => b.completedAt - a.completedAt));
            });
            return () => { hRef.child('active_devices').off(); hRef.child('history').off(); };
        }, [hid, user.uid]);

        const handleComplete = (did) => {
            const activeRef = db.ref(`hospitals/${hid}/active_devices/${did}`);
            activeRef.once('value', snap => {
                if (snap.exists()) {
                    db.ref(`hospitals/${hid}/history`).push({ ...snap.val(), completedAt: Date.now() }, (err) => {
                        if (!err) activeRef.remove();
                    });
                }
            });
        };

        const filteredHistory = filterHistoryByTime(history, filterPeriod);

        return (
            <div className="min-h-screen pb-20 fade-in">
                {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
                <AppHeader title={hName} subtitle={`Staff: ${nurseName || user.email.split('@')[0]}`} onLogout={onLogout} />
                
                <div className="p-4 md:p-6 max-w-5xl mx-auto space-y-6 mt-4">
                    <div className="flex gap-6 border-b border-slate-200">
                        <button onClick={()=>setTab('active')} className={`pb-3 text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 ${tab==='active' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400'}`}>My Patients ({devices.length})</button>
                        <button onClick={()=>setTab('history')} className={`pb-3 text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 ${tab==='history' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400'}`}>History</button>
                    </div>

                    {tab === 'active' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                            {devices.map(d => <StatusCard key={d.deviceId} data={d} onComplete={handleComplete} />)}
                            {devices.length === 0 && (
                                <div className="col-span-full py-20 text-center border-2 border-dashed border-slate-300 rounded-3xl bg-white/50 text-slate-400">
                                    <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-bed text-2xl text-slate-300"></i></div>
                                    <p className="font-bold text-lg text-slate-500">No active infusions</p>
                                    <p className="text-sm mt-1">Tap the + button to assign a device.</p>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {tab === 'history' && (
                        <div>
                            <FilterTabs current={filterPeriod} onChange={setFilterPeriod} resultCount={filteredHistory.length} />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 opacity-80">
                                {filteredHistory.slice(0, 50).map((d,i) => <StatusCard key={i} data={d} isHistory={true} />)}
                                {filteredHistory.length === 0 && <p className="col-span-full text-center text-slate-400 py-10">No records found for this period.</p>}
                            </div>
                        </div>
                    )}
                </div>

                <button onClick={()=>setShowAdd(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-2xl shadow-blue-500/40 flex items-center justify-center text-2xl hover:-translate-y-1 active:scale-90 transition-all z-50">
                    <i className="fas fa-plus"></i>
                </button>

                <PatientFormModal isOpen={showAdd} onClose={()=>setShowAdd(false)} hospitalId={hid} user={{ uid: user.uid, role: 'nurse', name: nurseName || user.email.split('@')[0] }} onSuccess={() => { setToast({type: 'success', msg: 'Infusion Started'}); setTimeout(()=>setToast(null), 2000); }} />
            </div>
        );
    };

    // ────────────────────────────────────────────────
    // SUPER ADMIN VIEW
    // ────────────────────────────────────────────────
    const SuperDashboard = ({ onLogout }) => {
        const [hospitals, setHospitals] = useState({});
        const [viewId, setViewId] = useState(null);

        useEffect(() => { db.ref('hospitals').on('value', snap => setHospitals(snap.val() || {})); }, []);

        const stats = useMemo(() => {
            let active = 0, nurses = 0, devices = new Set();
            Object.values(hospitals).forEach(h => {
                if(h.active_devices) {
                    active += Object.keys(h.active_devices).length;
                    Object.values(h.active_devices).forEach(d => devices.add(d.deviceId));
                }
                if(h.history) {
                    Object.values(h.history).forEach(d => devices.add(d.deviceId));
                }
                if(h.nurses) nurses += Object.keys(h.nurses).length;
            });
            return { active, nurses, devices: devices.size };
        }, [hospitals]);

        if (viewId) {
            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg sticky top-0 z-50 backdrop-blur-md bg-slate-900/90">
                        <button onClick={()=>setViewId(null)} className="flex items-center gap-3 hover:text-blue-400 transition-colors bg-slate-800 px-4 py-2 rounded-xl font-bold text-sm">
                            <i className="fas fa-arrow-left"></i> <span>Network Grid</span>
                        </button>
                        <div className="font-extrabold tracking-tight">{hospitals[viewId]?.name}</div>
                    </header>
                    <div className="p-4 md:p-8 max-w-7xl mx-auto">
                        <HospitalDashboard hospitalId={viewId} userRole="admin" isSuperView={true} />
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen pb-10 fade-in">
                <AppHeader title="Super Admin" subtitle="Global Network Control" onLogout={onLogout} />
                
                <div className="p-4 md:p-8 max-w-7xl mx-auto space-y-8">
                    <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 rounded-[2rem] p-8 md:p-10 text-white shadow-2xl relative overflow-hidden border border-slate-700">
                        <div className="absolute right-0 top-0 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
                        <div className="relative z-10 grid grid-cols-2 md:grid-cols-4 gap-8">
                            <div>
                                <div className="text-[10px] font-extrabold text-blue-300 uppercase tracking-widest mb-2 flex items-center gap-2"><i className="fas fa-microchip"></i> Network Devices</div>
                                <div className="text-5xl font-black text-white">{stats.devices}</div>
                            </div>
                            <div>
                                <div className="text-[10px] font-extrabold text-emerald-300 uppercase tracking-widest mb-2 flex items-center gap-2"><i className="fas fa-file-invoice-dollar"></i> Est. Mo. Revenue</div>
                                <div className="text-5xl font-black text-emerald-400">{formatMoney(stats.devices * MAINTENANCE_FEE_PER_DEVICE)}</div>
                            </div>
                            <div>
                                <div className="text-[10px] font-extrabold text-purple-300 uppercase tracking-widest mb-2 flex items-center gap-2"><i className="fas fa-hospital"></i> Facilities</div>
                                <div className="text-5xl font-black text-white">{Object.keys(hospitals).length}</div>
                            </div>
                            <div>
                                <div className="text-[10px] font-extrabold text-rose-300 uppercase tracking-widest mb-2 flex items-center gap-2"><i className="fas fa-procedures"></i> Live Infusions</div>
                                <div className="text-5xl font-black text-white">{stats.active}</div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 className="font-extrabold text-slate-800 text-xl mb-6 tracking-tight">Partner Hospitals</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {Object.entries(hospitals).map(([hid, h]) => {
                                const hDevs = new Set();
                                if(h.active_devices) Object.values(h.active_devices).forEach(d => hDevs.add(d.deviceId));
                                if(h.history) Object.values(h.history).forEach(d => hDevs.add(d.deviceId));
                                
                                return (
                                    <div key={hid} onClick={()=>setViewId(hid)} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 cursor-pointer hover:shadow-xl hover:-translate-y-1.5 transition-all group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-0 group-hover:scale-110 transition-transform"></div>
                                        <div className="relative z-10">
                                            <div className="w-14 h-14 bg-white shadow-md border border-slate-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mb-5 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                                <i className="fas fa-hospital"></i>
                                            </div>
                                            <h4 className="font-extrabold text-xl text-slate-800 mb-1 tracking-tight">{h.name}</h4>
                                            <div className="text-xs font-bold text-slate-400 mb-5 flex items-center gap-1.5"><i className="fas fa-map-marker-alt"></i> {h.location}</div>
                                            
                                            <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                                                <div className="text-center">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Devices</div>
                                                    <div className="font-black text-slate-700">{hDevs.size}</div>
                                                </div>
                                                <div className="w-px h-6 bg-slate-200"></div>
                                                <div className="text-center">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active</div>
                                                    <div className="font-black text-blue-600">{h.active_devices ? Object.keys(h.active_devices).length : 0}</div>
                                                </div>
                                                <div className="w-px h-6 bg-slate-200"></div>
                                                <div className="text-center">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Staff</div>
                                                    <div className="font-black text-slate-700">{h.nurses ? Object.keys(h.nurses).length : 0}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // ────────────────────────────────────────────────
    // AUTH ROUTING
    // ────────────────────────────────────────────────
    const LoginScreen = () => {
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [loading, setLoading] = useState(false);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (err) { alert(err.message); setLoading(false); }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden fade-in">
                <div className="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
                <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-indigo-400/20 rounded-full blur-[100px] pointer-events-none"></div>
                
                <div className="glass-panel w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl relative z-10">
                    <div className="text-center mb-10">
                        <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-blue-500/30 mb-6 transform -rotate-3 hover:rotate-0 transition-all">
                            <i className="fas fa-heartbeat text-4xl text-white"></i>
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tight">SalineGuard</h1>
                        <p className="text-sm font-bold tracking-widest text-blue-600 uppercase mt-2">Enterprise Access</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="space-y-1.5">
                            <label className="text-[10px] uppercase tracking-widest font-extrabold text-slate-500 ml-2">Secure ID</label>
                            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="username@hospital.branch" className="w-full p-4 bg-white/80 rounded-2xl border border-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition-all font-medium text-slate-800 shadow-sm" required />
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-[10px] uppercase tracking-widest font-extrabold text-slate-500 ml-2">Password</label>
                            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" className="w-full p-4 bg-white/80 rounded-2xl border border-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition-all font-medium text-slate-800 shadow-sm" required />
                        </div>
                        <button disabled={loading} className="w-full bg-slate-900 hover:bg-black text-white py-4 mt-2 rounded-2xl font-extrabold shadow-xl shadow-slate-900/20 active:scale-[0.98] transition-all flex justify-center items-center">
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Authenticate'}
                        </button>
                    </form>
                </div>
            </div>
        );
    };

    const App = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
            return () => unsub();
        }, []);

        if (loading) return <LoadingScreen />;
        if (!user) return <LoginScreen />;
        
        const info = getHospitalInfo(user.email);
        if (info.id === 'super_admin') return <SuperDashboard onLogout={()=>auth.signOut()} />;
        
        if (user.email.startsWith('admin@')) return (
            <div className="min-h-screen pb-10">
                <AppHeader title={info.name} subtitle="Hospital Administration" onLogout={()=>auth.signOut()} />
                <div className="p-4 md:p-8 max-w-7xl mx-auto">
                    <HospitalDashboard hospitalId={info.id} userRole="admin" />
                </div>
            </div>
        );

        return <NurseApp user={user} onLogout={()=>auth.signOut()} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
